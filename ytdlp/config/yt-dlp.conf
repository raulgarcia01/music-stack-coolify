# yt-dlp.conf — configuración por defecto para descargas de música
# Este archivo va en ./ytdlp/config/yt-dlp.conf

# ── Formato de salida ──────────────────────────────
# MP3 a máxima calidad (~320kbps VBR)
--format bestaudio/best
--extract-audio
--audio-format mp3
--audio-quality 0

# ── Metadata y thumbnail ───────────────────────────
--embed-thumbnail
--embed-metadata
--add-metadata

# ── Estructura de carpetas ─────────────────────────
# Resultado: /music/NombreDelCanal/TítuloDeLaCanción.mp3
# Picard corregirá el artista/álbum después
--output /downloads/%(uploader)s/%(title)s.%(ext)s

# ── Comportamiento ─────────────────────────────────
--no-playlist          # no descarga playlists por defecto (usa --yes-playlist para forzar)
--no-overwrites        # no reescribe archivos ya descargados
--continue             # retoma descargas interrumpidas
--sponsorblock-remove all  # elimina segmentos de SponsorBlock si los hay
