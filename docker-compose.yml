services:

  # ─────────────────────────────────────────────
  # NAVIDROME — servidor de música
  # ─────────────────────────────────────────────
  navidrome:
    image: ghcr.io/navidrome/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    environment:
      - SERVICE_URL_NAVIDROME_4533
      - ND_BASEURL=${SERVICE_FQDN_NAVIDROME}
      - ND_SCANSCHEDULE=${ND_SCANSCHEDULE:-1h}
      - ND_LOGLEVEL=${ND_LOGLEVEL:-info}
      - ND_SESSIONTIMEOUT=${ND_SESSIONTIMEOUT:-24h}
      - ND_ENABLEINSIGHTSCOLLECTOR=${ND_ENABLEINSIGHTSCOLLECTOR:-false}
      - ND_MUSICFOLDER=/music
      # - ND_SPOTIFY_ID=${ND_SPOTIFY_ID:-}
      # - ND_SPOTIFY_SECRET=${ND_SPOTIFY_SECRET:-}
      # - ND_LASTFM_APIKEY=${ND_LASTFM_APIKEY:-}
      # - ND_LASTFM_SECRET=${ND_LASTFM_SECRET:-}
    volumes:
      - type: bind
        source: ./data
        target: /data
        is_directory: true
      - type: bind
        source: /home/botadmin/Music
        target: /music
        read_only: true
    healthcheck:
      test: [CMD, wget, '--spider', '--quiet', 'http://127.0.0.1:4533/ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # YT-DLP WEB UI — descargador con interfaz web
  # Acceso via dominio asignado por Coolify
  # El config.yml se crea automáticamente por Coolify
  # usando el atributo content: (no necesita archivo externo)
  # ─────────────────────────────────────────────
  ytdlp-webui:
    image: marcobaobao/yt-dlp-webui:latest
    container_name: ytdlp-webui
    restart: unless-stopped
    environment:
      - SERVICE_URL_YTDLP-WEBUI_3033
      # Requeridas — Coolify bloquea el deploy si están vacías
      - JWT_SECRET=${YTDLP_JWT_SECRET:?JWT_SECRET es requerido}
    volumes:
      - type: bind
        source: /home/botadmin/Music
        target: /downloads
      # Coolify crea este archivo automáticamente con el contenido definido en content:
      # No necesitas crear el archivo manualmente ni montarlo desde el host
      - type: bind
        source: ./ytdlp/config.yml
        target: /config/config.yml
        content: |
          downloadsDir: /downloads
          queueSize: 2
          require_auth: true
          username: ${YTDLP_USER:?YTDLP_USER es requerido}
          password: ${YTDLP_PASS:?YTDLP_PASS es requerido}
          ytdlp:
            args:
              - "--format"
              - "bestaudio/best"
              - "--extract-audio"
              - "--audio-format"
              - "mp3"
              - "--audio-quality"
              - "0"
              - "--embed-thumbnail"
              - "--embed-metadata"
              - "--add-metadata"
              - "--no-overwrites"
              - "--output"
              - "/downloads/%(uploader)s/%(title)s.%(ext)s"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3033']
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────
  # PICARD (WEB) — tagging de metadata
  # ─────────────────────────────────────────────
  picard:
    image: aandree5/picard-web:latest
    container_name: picard
    restart: unless-stopped
    environment:
      - SERVICE_URL_PICARD_5000
    volumes:
      - type: bind
        source: ./picard/config
        target: /picard-web
        is_directory: true
      - type: bind
        source: /home/botadmin/Music
        target: /music

  # ─────────────────────────────────────────────
  # ESSENTIA — tagging automático de géneros por IA
  # Servicio one-shot — ejecutar manualmente:
  #   docker compose run --rm essentia --dry-run
  #   docker compose run --rm essentia
  # ─────────────────────────────────────────────
  essentia:
    build:
      context: ./essentia
      dockerfile: Dockerfile
    container_name: essentia
    restart: 'no'
    exclude_from_hc: true
    volumes:
      - type: bind
        source: /home/botadmin/Music
        target: /music
      - type: bind
        source: ./essentia/models
        target: /app/models
        is_directory: true
    working_dir: /app
    command: ['python', 'tag_music.py', '/music', '--auto']
